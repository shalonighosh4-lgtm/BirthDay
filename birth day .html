<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    min-height:100vh;
    overflow-x:hidden;
    text-align:center;
    color:white;
}

/* Confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Balloons */
.balloon{
    position:fixed;
    bottom:-150px;
    width:60px;
    height:80px;
    border-radius:50%;
    animation:floatUp linear infinite;
}

.balloon::after{
    content:"";
    position:absolute;
    width:2px;
    height:60px;
    background:white;
    left:50%;
    top:80px;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

.container{
    padding:50px 20px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    max-width:900px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    font-size:60px;
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white; }
    to{ text-shadow:0 0 25px gold; }
}

.message{
    font-size:22px;
    line-height:1.8;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    border:4px solid white;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.footer{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
}

@media(max-width:700px){
    h1{
        font-size:40px;
    }

    .gallery{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div id="confetti-container"></div>
<div id="balloon-container"></div>

<div class="container">
    <div class="card">

        <h1>🎉 Happy Birthday 🎉</h1>

        <h2>Dear My Best Friend ❤️</h2>

        <p class="message">
            Wishing you endless happiness, success,
            laughter and unforgettable memories.
            May your special day be filled with love,
            joy and beautiful surprises.
        </p>

        <div class="gallery">
            <img src="c:\Users\SHALONI\OneDrive\Pictures\Saved Pictures\5c7fcb43-adcc-43d9-81de-9c5bdf9475a7.jpeg" alt="">
            <img src="c:\Users\SHALONI\OneDrive\문서\WhatsApp Image 2026-06-12 at 21.06.16.jpeg" alt="">
            <img src="pic3.jpg" alt="">
            <img src="pic4.jpg" alt="">
        </div>

        <div class="footer">
            🎂 Have an Amazing Birthday! 🎂
        </div>

    </div>
</div>

<script>
// Confetti
for(let i=0;i<120;i++){
    let confetti=document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left=Math.random()*100+"vw";
    confetti.style.background=
    `hsl(${Math.random()*360},100%,50%)`;

    confetti.style.animationDuration=
    (3+Math.random()*5)+"s";

    confetti.style.opacity=Math.random();

    document.body.appendChild(confetti);
}

// Balloons
const colors=["red","blue","yellow","green","purple","orange","pink"];

for(let i=0;i<15;i++){
    let balloon=document.createElement("div");
    balloon.classList.add("balloon");

    balloon.style.left=Math.random()*100+"vw";
    balloon.style.background=
    colors[Math.floor(Math.random()*colors.length)];

    balloon.style.animationDuration=
    (8+Math.random()*6)+"s";

    document.body.appendChild(balloon);
}
</script>

</body>
</html>
